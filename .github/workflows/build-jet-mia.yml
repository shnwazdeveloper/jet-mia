name: Build Jet Mia

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[windows-only]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Rust
        working-directory: app
        run: |
          rustup show
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/app/outputs/flutter-apk/app-release.apk artifacts/jet_mia.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jet_mia_apk
          path: artifacts/jet_mia.apk
          if-no-files-found: error
